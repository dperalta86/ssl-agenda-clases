<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portal del curso - Agenda de clases y recursos">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Portal del Curso - Compiladores 2025</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-ssl">SSL</div>
        <div class="brand-info">
          <div class="brand-institution" id="brand-institution">Cargando...</div>
          <div class="brand-subject" id="brand-subject">Cargando...</div>
          <div class="brand-courses" id="brand-courses">Cargando...</div>
        </div>
      </div>
      <div class="quick-links">
        <a class="qlink zoom" href="#" id="zoom-link" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="15" height="11" rx="2"/>
            <path d="M17 9l5-2v10l-5-2"/>
          </svg>
          Zoom
        </a>
        <a class="qlink discord" href="#" id="discord-link" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.74 19.74 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.003.022.015.04.031.05a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.1 13.1 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
          </svg>
          Discord
        </a>
        <a class="qlink note" href="#" id="onenote-link" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          OneNote
        </a>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="section-label">Próxima clase</div>
    <div id="next-container">
      <div class="state-card">
        <div class="spinner"></div>
        Cargando datos del curso...
      </div>
    </div>

    <div class="notices-section" id="notices-section" style="display:none">
      <div class="section-label">Últimos avisos</div>
      <div id="notices-list"></div>
    </div>

    <div class="past-section" id="past-section" style="display:none">
      <div class="back-bar">
        <button class="back-btn" id="back-to-next-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 15l-6-6-6 6"/>
          </svg>
          volver a próxima clase
        </button>
      </div>
      <div class="section-label">Clases anteriores</div>
      <div class="past-list" id="past-list"></div>
    </div>
  </main>

  <button class="sticky-return" id="sticky-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
    Próxima clase
  </button>

  <!-- Scripts -->
  <script src="js/config.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/render.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
